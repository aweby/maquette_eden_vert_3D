# À inclure dans le server { } du vhost (ex. info.edenvert3d.fr) :
#   include /chemin/vers/nginx-cache-static.conf;
#
# Adapter root / alias si besoin ; les chemins d’URL sont /images/ et /logo.png.

location ^~ /images/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, stale-while-revalidate=604800" always;
}

location = /logo.png {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, stale-while-revalidate=604800" always;
}

location = /logo-400w.png {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, stale-while-revalidate=604800" always;
}

location = /logo-800w.png {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, stale-while-revalidate=604800" always;
}
